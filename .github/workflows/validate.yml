name: Validate Kit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate tracked JSON
        run: |
          set -euo pipefail
          git ls-files '*.json' | while read -r file; do
            python3 -m json.tool "$file" >/dev/null
          done

      - name: Validate skill scaffolds
        run: python3 scripts/validate-skills.py --strict

      - name: Validate skill script contracts
        run: python3 scripts/validate-skill-scripts.py --strict --run-checks

      - name: Validate doc factory
        run: bash scripts/doc-factory/check.sh

      - name: Validate completed skill DoD
        run: |
          set -euo pipefail
          for skill in \
            folio-generator \
            follow-up-email \
            font-optimization \
            form-builder \
            form-engineering \
            form-ux-advanced \
            functional-spec \
            functional-toolbelt; do
            python3 scripts/validate-skill-dod.py --skill "$skill"
          done

      - name: Verify component counts and docs
        run: python3 scripts/count-components.py --check-docs

      - name: Check repository boundaries
        run: bash scripts/check-repo-boundaries.sh

      - name: Validate runtime instruction homology
        run: python3 scripts/validate-runtime-instructions.py

      - name: Verify adapter freshness
        run: |
          set -euo pipefail
          bash scripts/adapt.sh all
          if ! git diff --quiet -- \
            AGENTS.md \
            GEMINI.md \
            .agent/rules/GEMINI.md \
            .agent/ARCHITECTURE.md \
            .agent/skills_index.json \
            .github/copilot-instructions.md \
            .cursorrules \
            .windsurfrules; then
            echo "::error::Runtime adapter outputs are stale. Run bash scripts/adapt.sh all"
            git diff -- \
              AGENTS.md \
              GEMINI.md \
              .agent/rules/GEMINI.md \
              .agent/ARCHITECTURE.md \
              .agent/skills_index.json \
              .github/copilot-instructions.md \
              .cursorrules \
              .windsurfrules
            exit 1
          fi

      - name: Diagnose user context repo
        run: python3 scripts/diagnose-user-context.py --dry-run

      - name: Diagnose personal skills repo
        run: python3 scripts/diagnose-personal-skills.py --dry-run

      - name: Personal skills sync dry-run
        run: python3 scripts/sync-personal-skills.py --dry-run --target /tmp/alfa-personal-skills-target

      - name: Run safe adversarial guardrail tests
        run: python3 scripts/qa/run-adversarial-tests.py

      - name: Run confidence calibration and false-positive tests (Katas 29-30)
        run: python3 scripts/qa/run-confidence-fp-tests.py

      - name: Validate headless review annotations schema (Kata 13)
        run: python3 scripts/post_annotations.py --validate-only references/schemas/annotations.example.json

      - name: Scaffold dry-run smoke test
        run: |
          python3 scripts/scaffold-skill.py \
            --name scaffold-smoke-test \
            --description "Smoke test skill" \
            --triggers smoke-test \
            --allowed-tools Read,Grep \
            --owner "JM Labs" \
            --version 0.1.0 \
            --dry-run
          python3 scripts/scaffold-skill.py \
            --name personal-smoke-test \
            --description "Personal smoke test" \
            --triggers personal-smoke-test \
            --allowed-tools Read,Grep \
            --owner "JM Labs" \
            --version 0.1.0 \
            --personal \
            --dry-run
          if python3 scripts/scaffold-skill.py --name invalid-mode --local --personal --dry-run; then
            echo "::error::--local and --personal must be mutually exclusive"
            exit 1
          fi

      - name: ShellCheck when available
        run: |
          set -euo pipefail
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck -S error scripts/*.sh scripts/adapters/*.sh scripts/doc-factory/*.sh skills/*/scripts/*.sh
          else
            echo "shellcheck not installed; skipping shell lint"
          fi

      - name: Verify generated index freshness
        run: |
          set -euo pipefail
          bash scripts/generate-pristino-index.sh
          if ! git diff --quiet -- PRISTINO-INDEX.md; then
            echo "::error::PRISTINO-INDEX.md is stale. Run bash scripts/generate-pristino-index.sh"
            git diff -- PRISTINO-INDEX.md
            exit 1
          fi

      - name: Tracked secret pattern scan
        run: |
          set -euo pipefail
          PATTERNS='(AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|ghp_[0-9A-Za-z]{36}|sk-[0-9A-Za-z]{48}|-----BEGIN (RSA |EC )?PRIVATE KEY)'
          found=0
          while IFS= read -r -d '' file; do
            [ -f "$file" ] || continue
            case "$file" in
              *.env|*.env.*|*/.env|*/.env.*) continue ;;
            esac
            if grep -Iq . "$file" && grep -nE "$PATTERNS" "$file"; then
              found=1
            fi
          done < <(git ls-files -z)
          if [ "$found" -ne 0 ]; then
            echo "::error::Potential tracked secret found"
            exit 1
          fi
          echo "No tracked secret patterns detected"
