<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Assumption Log</title>
<style>
:root {
  --bg: #f8fafc;
  --ink: #111827;
  --muted: #4b5563;
  --line: #d1d5db;
  --accent: #0f766e;
  --warn: #b45309;
}
body {
  margin: 0;
  padding: 32px;
  background: var(--bg);
  color: var(--ink);
  font-family: Arial, Helvetica, sans-serif;
  line-height: 1.5;
}
main {
  max-width: 1120px;
  margin: 0 auto;
}
h1, h2 {
  letter-spacing: 0;
}
h1 {
  font-size: 32px;
  margin: 0 0 8px;
}
h2 {
  margin-top: 32px;
  color: var(--accent);
  font-size: 20px;
}
p {
  color: var(--muted);
}
table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0 24px;
  background: #ffffff;
}
th, td {
  border: 1px solid var(--line);
  padding: 8px;
  text-align: left;
  vertical-align: top;
  font-size: 14px;
}
th {
  background: #e5e7eb;
}
.warning {
  border-left: 4px solid var(--warn);
  background: #fffbeb;
  padding: 12px;
}
</style>
</head>
<body>
<main>
  <h1>Assumption Log</h1>
  <p>{{SCOPE}}</p>
  {{CONTENT}}
</main>
</body>
</html>
