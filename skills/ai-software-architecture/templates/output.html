<!-- JM Labs Template: AI Software Architecture -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | AI Software Architecture | JM Labs</title>
<style>
:root{--ink:#111827;--muted:#4b5563;--line:#d1d5db;--accent:#137dc5;--gold:#b08900;--bg:#f8fafc}
body{font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--ink);margin:0;padding:32px}
main{max-width:1080px;margin:0 auto;background:#fff;border:1px solid var(--line);padding:32px}
h1,h2{line-height:1.15;margin:0 0 16px}
h1{font-size:34px;color:var(--accent)}
h2{font-size:22px;border-bottom:2px solid var(--line);padding-bottom:8px;margin-top:28px}
.meta{color:var(--muted);margin-bottom:24px}
table{width:100%;border-collapse:collapse;margin:16px 0}
th,td{border:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}
th{background:#eef6fc}
.decision{border-left:4px solid var(--gold);padding-left:12px}
footer{margin-top:32px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<main>
<h1>{{TITLE}}</h1>
<p class="meta">AI Software Architecture - JM Labs - {{VERSION}}</p>
{{CONTENT}}
<footer>Validated against ai-software-architecture assets and deterministic checks.</footer>
</main>
</body>
</html>
