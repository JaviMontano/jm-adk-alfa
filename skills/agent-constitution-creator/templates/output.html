<!-- JM Labs offline template: Agent Constitution Creator -->
<!-- Replace: {{TITLE}}, {{SUBTITLE}}, {{CONTENT}}, {{CONSTITUTION_DATE}} -->
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | Agent Constitution | JM Labs</title>
<style>
:root{--navy:#122562;--gold:#FFD700;--blue:#137DC5;--bg:#0B1120;--bg-alt:#0F1929;--heading:#F1F5F9;--text-s:#94A3B8}
body{font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--heading);margin:0;padding:2rem}
.c{max-width:1000px;margin:0 auto}
h1{font-weight:900;font-size:2.5rem}
h1 .gold{color:var(--gold)}
h2{color:var(--gold);border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:.5rem}
.packet{background:var(--bg-alt);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:1.5rem;margin:1rem 0}
table{width:100%;border-collapse:collapse}
th{color:var(--gold);text-align:left;padding:.75rem;border-bottom:2px solid var(--gold)}
td{padding:.75rem;border-bottom:1px solid rgba(255,255,255,.08)}
footer{text-align:center;margin-top:3rem;border-top:2px solid var(--gold);padding:1.5rem;font-size:.75rem;color:var(--text-s)}
</style>
</head>
<body>
<div class="c">
  <h1>JM <span class="gold">Labs</span></h1>
  <h2>{{TITLE}}</h2>
  <p style="color:var(--text-s)">{{SUBTITLE}}</p>
  <div class="packet">{{CONTENT}}</div>
  <footer>JM Labs · Agent Constitution · {{CONSTITUTION_DATE}}</footer>
</div>
</body>
</html>
