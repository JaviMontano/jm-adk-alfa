<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} | Workflow Creator | JM Labs</title>
  <style>
    :root {
      --navy: #122562;
      --gold: #ffd700;
      --blue: #137dc5;
      --bg: #0b1120;
      --panel: #111827;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: #334155;
    }
    body {
      margin: 0;
      padding: 32px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.55;
    }
    main {
      max-width: 1000px;
      margin: 0 auto;
    }
    h1, h2 {
      color: var(--text);
      letter-spacing: 0;
    }
    h1 span {
      color: var(--gold);
    }
    section {
      border-top: 1px solid var(--line);
      padding: 20px 0;
    }
    pre {
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 16px;
    }
    .muted {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>JM <span>Labs</span> · Workflow Creator</h1>
    <p class="muted">{{SUBTITLE}}</p>
    <section>
      <h2>Activation Decision</h2>
      <p>{{ACTIVATION_DECISION}}</p>
    </section>
    <section>
      <h2>Workflow Spec</h2>
      <pre>{{WORKFLOW_YAML}}</pre>
    </section>
    <section>
      <h2>Validation Evidence</h2>
      <p>{{VALIDATION_EVIDENCE}}</p>
    </section>
    <section>
      <h2>Risks And Open Items</h2>
      <p>{{RISKS_AND_OPEN_ITEMS}}</p>
    </section>
  </main>
</body>
</html>
