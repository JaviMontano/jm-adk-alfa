<!-- JM Labs Brand Template: Tasklog Management -->
<!-- Offline template: no remote fonts, scripts, or images. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | Tasklog Management | JM Labs</title>
<style>
:root{--navy:#122562;--surface:#0F1929;--gold:#FFD700;--blue:#137DC5;--text:#F1F5F9;--muted:#94A3B8}
body{font-family:Inter,Arial,sans-serif;background:#0B1120;color:var(--text);margin:0;padding:2rem}
.c{max-width:1000px;margin:0 auto}
h1{font-weight:900;font-size:2.5rem}
h1 .gold{color:var(--gold)}
h2{color:var(--gold);border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:.5rem}
.panel{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:1.25rem;margin:1rem 0}
table{width:100%;border-collapse:collapse}
th{color:var(--gold);text-align:left;padding:.75rem;border-bottom:2px solid var(--gold)}
td{padding:.75rem;border-bottom:1px solid rgba(255,255,255,.08)}
code{color:var(--gold)}
footer{text-align:center;margin-top:3rem;border-top:2px solid var(--gold);padding:1.5rem;font-size:.75rem;color:var(--muted)}
</style>
</head>
<body><div class="c">
<h1>JM <span class="gold">Labs</span></h1>
<h2>{{TITLE}}</h2>
<p style="color:var(--muted)">{{SUBTITLE}}</p>
<div class="panel">{{CONTENT}}</div>
<footer>JM Labs · Tasklog Management · {{DATE}}</footer>
</div></body></html>
