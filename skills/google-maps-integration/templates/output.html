<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | Google Maps Platform Offline Plan</title>
<style>
:root{--navy:#122562;--gold:#FFD700;--cyan:#137DC5;--dark:#1F2833;--gray:#EEF2F7;--text:#172033;--muted:#536174;--line:#D9E2EC}
*{box-sizing:border-box}
body{font-family:Trebuchet MS,Arial,sans-serif;background:#fff;color:var(--text);margin:0;line-height:1.5}
main{max-width:1120px;margin:0 auto;padding:32px 20px}
header{border-bottom:4px solid var(--gold);padding-bottom:20px;margin-bottom:24px}
h1,h2,h3{font-family:Poppins,Trebuchet MS,Arial,sans-serif;letter-spacing:0}
h1{font-size:2rem;color:var(--navy);margin:.25rem 0}
h2{font-size:1.15rem;color:var(--navy);border-bottom:1px solid var(--line);padding-bottom:.35rem;margin-top:1.6rem}
.subtitle{color:var(--muted);font-family:Futura,Trebuchet MS,Arial,sans-serif}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.panel{border:1px solid var(--line);border-radius:8px;padding:16px;background:#fff}
.tag{display:inline-block;border-left:4px solid var(--cyan);padding-left:8px;color:var(--dark);font-weight:700}
code,pre{font-family:JetBrains Mono,Menlo,Consolas,monospace}
table{width:100%;border-collapse:collapse}
th,td{padding:.7rem;border-bottom:1px solid var(--line);vertical-align:top}
th{text-align:left;color:var(--navy);background:var(--gray)}
footer{margin-top:32px;border-top:1px solid var(--line);padding-top:16px;color:var(--muted);font-size:.85rem}
@media print{main{max-width:none;padding:16px}a{color:var(--navy)}}
</style>
</head>
<body>
<main>
<header>
<span class="tag">[CONFIG] Offline plan only</span>
<h1>{{TITLE}}</h1>
<p class="subtitle">{{SUBTITLE}}</p>
</header>
<section class="panel">
{{CONTENT}}
</section>
<footer>[CODE] Generated from local google-maps-integration templates on {{DATE}}.</footer>
</main>
</body>
</html>
