<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evaluation Confidence Design Report</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.5; color: #17202a; }
    main { max-width: 960px; margin: 0 auto; }
    section { border-top: 1px solid #d7dde5; padding: 1rem 0; }
    code, pre { background: #f4f6f8; border-radius: 6px; padding: 0.1rem 0.3rem; }
    .status { font-weight: 700; color: #0f766e; }
  </style>
</head>
<body>
  <main>
    <h1>Evaluation Confidence Design Report</h1>
    <p class="status">Deterministic calibrated evaluation package.</p>
    <section>
      <h2>Summary</h2>
      <p>{{summary}}</p>
    </section>
    <section>
      <h2>Calibration</h2>
      <pre>{{calibration}}</pre>
    </section>
    <section>
      <h2>Category Metrics</h2>
      <pre>{{category_metrics}}</pre>
    </section>
    <section>
      <h2>Validation</h2>
      <pre>{{validation}}</pre>
    </section>
  </main>
</body>
</html>
