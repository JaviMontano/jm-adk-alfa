<!-- JM Labs Template: AI Code Review -->
<!-- Replace: {{TITLE}}, {{SUBTITLE}}, {{CONTENT}}, {{DATE}} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | AI Code Review | JM Labs</title>
<style>
:root{--ink:#101820;--surface:#f7f9fb;--line:#d8dee6;--accent:#0b6bcb;--warn:#a35c00;--block:#b42318}
body{font-family:Arial,Helvetica,sans-serif;background:var(--surface);color:var(--ink);margin:0;padding:24px}
main{max-width:1040px;margin:0 auto}
h1,h2{margin:0 0 12px}
h1{font-size:32px}
h2{font-size:20px;border-bottom:1px solid var(--line);padding-bottom:6px;margin-top:28px}
.meta{color:#4b5563;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{background:#eaf2fb;color:#0b3b70}
.priority-p0,.priority-p1{color:var(--block);font-weight:bold}
.priority-p2{color:var(--warn);font-weight:bold}
code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--line);color:#4b5563;font-size:12px}
@media print{body{background:#fff;padding:0}main{max-width:none}}
</style>
</head>
<body>
<main>
<h1>{{TITLE}}</h1>
<p class="meta">{{SUBTITLE}}</p>
{{CONTENT}}
<footer>JM Labs - {{DATE}}</footer>
</main>
</body>
</html>
