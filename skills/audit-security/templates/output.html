<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Audit Security Report</title>
<style>
:root {
  --bg: #f8fafc;
  --ink: #111827;
  --muted: #4b5563;
  --line: #d1d5db;
  --critical: #b91c1c;
  --warning: #b45309;
  --info: #0369a1;
}
body {
  margin: 0;
  padding: 32px;
  background: var(--bg);
  color: var(--ink);
  font-family: Arial, Helvetica, sans-serif;
  line-height: 1.5;
}
main {
  max-width: 1200px;
  margin: 0 auto;
}
h1, h2 {
  letter-spacing: 0;
}
h1 {
  font-size: 32px;
  margin: 0 0 8px;
}
h2 {
  margin-top: 32px;
  font-size: 20px;
}
p {
  color: var(--muted);
}
table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0 24px;
  background: #ffffff;
}
th, td {
  border: 1px solid var(--line);
  padding: 8px;
  text-align: left;
  vertical-align: top;
  font-size: 14px;
}
th {
  background: #e5e7eb;
}
.critical { color: var(--critical); font-weight: 700; }
.warning { color: var(--warning); font-weight: 700; }
.info { color: var(--info); font-weight: 700; }
</style>
</head>
<body>
<main>
  <h1>Audit Security Report</h1>
  <p>{{TARGET_ROOT}}</p>
  {{CONTENT}}
</main>
</body>
</html>
