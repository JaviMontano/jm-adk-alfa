<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | Code Review Checklist</title>
<style>
:root{--navy:#122562;--blue:#137DC5;--gold:#FFD700;--text:#1F2833;--muted:#667085;--surface:#FFFFFF;--bg:#F8F9FC;--border:#E8EAF0;--critical:#DC2626;--warning:#D97706}
body{font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);margin:0;line-height:1.5}
main{max-width:1080px;margin:0 auto;padding:32px}
header{background:var(--navy);color:white;border-bottom:6px solid var(--gold);padding:28px 32px}
h1,h2{margin:0 0 12px}
section{margin:24px 0}
table{width:100%;border-collapse:collapse;background:var(--surface)}
th,td{border:1px solid var(--border);padding:10px;text-align:left;vertical-align:top}
th{background:var(--navy);color:white}
.fail{color:var(--critical);font-weight:700}
.warn{color:var(--warning);font-weight:700}
.muted{color:var(--muted)}
footer{border-top:4px solid var(--gold);padding:18px 32px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>{{TITLE}}</h1>
  <p>{{SUBTITLE}}</p>
</header>
<main>{{CONTENT}}</main>
<footer>JM Labs | Code Review Checklist | {{REVIEW_DATE_SUPPLIED_BY_CALLER}}</footer>
</body>
</html>
