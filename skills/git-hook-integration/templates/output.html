<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | Git Hook Integration</title>
<style>
:root{--ink:#101828;--muted:#667085;--line:#d0d5dd;--bg:#f9fafb;--panel:#fff;--accent:#155eef}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--ink);margin:0;padding:24px}
main{max-width:1080px;margin:0 auto;background:var(--panel);border:1px solid var(--line);padding:24px}
h1{margin:0 0 8px;font-size:28px}
h2{border-bottom:1px solid var(--line);padding-bottom:8px;margin-top:28px}
.meta{color:var(--muted);font-size:14px}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{background:#eef4ff;color:var(--accent)}
code{font-family:"SFMono-Regular",Consolas,monospace;font-size:13px}
.risk{border-left:4px solid var(--accent);padding-left:12px;color:var(--muted)}
</style>
</head>
<body>
<main>
<h1>{{TITLE}}</h1>
<p class="meta">{{SUBTITLE}}</p>
<section>
<h2>Summary</h2>
{{SUMMARY_HTML}}
</section>
<section>
<h2>Hook Matrix</h2>
{{HOOK_MATRIX_HTML}}
</section>
<section>
<h2>Installation Plan</h2>
{{INSTALLATION_PLAN_HTML}}
</section>
<section class="risk">
<h2>Risks And Limits</h2>
{{RISKS_HTML}}
</section>
</main>
</body>
</html>
