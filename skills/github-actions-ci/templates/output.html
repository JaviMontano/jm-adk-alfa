<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | GitHub Actions CI/CD | JM Labs</title>
<style>
:root{--ink:#172033;--surface:#f7f9fb;--line:#d9e2ec;--ok:#047857;--warn:#b45309;--fail:#b91c1c;--muted:#52606d}
body{font-family:Arial,Helvetica,sans-serif;background:var(--surface);color:var(--ink);margin:0;padding:2rem;line-height:1.5}
.wrap{max-width:980px;margin:0 auto}
h1{font-size:2rem;margin:0 0 .25rem}
h2{font-size:1.1rem;margin-top:1.6rem;border-bottom:1px solid var(--line);padding-bottom:.35rem}
.meta{font-family:Menlo,Consolas,monospace;font-size:.85rem;color:var(--muted)}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:1rem;margin:1rem 0}
.pass{border-left:4px solid var(--ok)}
.warn{border-left:4px solid var(--warn)}
.block{border-left:4px solid var(--fail)}
code{font-family:Menlo,Consolas,monospace}
footer{margin-top:2rem;border-top:1px solid var(--line);padding-top:1rem;font-size:.85rem;color:var(--muted)}
@media print{body{background:#fff}.panel{break-inside:avoid}}
</style>
</head>
<body>
<main class="wrap">
<h1>{{TITLE}}</h1>
<p class="meta">{{SUBTITLE}}</p>
{{CONTENT}}
<footer>JM Labs - {{DATE}}</footer>
</main>
</body>
</html>
