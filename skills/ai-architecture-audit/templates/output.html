<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | AI Architecture Audit | JM Labs</title>
<style>
:root{--ink:#111827;--muted:#667085;--line:#D0D5DD;--panel:#F9FAFB;--accent:#2563EB;--critical:#B42318}
body{font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:#fff;margin:0;padding:32px;line-height:1.45}
main{max-width:1080px;margin:0 auto}
h1{font-size:30px;margin:0 0 8px}
h2{font-size:18px;margin:28px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}
.meta{color:var(--muted);font-size:14px;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}
th{background:var(--panel)}
.critical{color:var(--critical);font-weight:bold}
code{font-family:Menlo,Consolas,monospace;font-size:.95em}
footer{margin-top:32px;color:var(--muted);font-size:12px;border-top:1px solid var(--line);padding-top:12px}
</style>
</head>
<body>
<main>
<h1>{{TITLE}}</h1>
<p class="meta">{{SUBTITLE}}</p>
{{CONTENT}}
<footer>JM Labs — {{DATE}}</footer>
</main>
</body>
</html>
