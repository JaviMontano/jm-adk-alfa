<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | AI CONOPS | JM Labs</title>
<style>
:root{--ink:#111827;--surface:#f8fafc;--line:#d7dde8;--accent:#0b6bcb;--muted:#526070}
body{font-family:Arial,Helvetica,sans-serif;background:var(--surface);color:var(--ink);margin:0;padding:24px}
main{max-width:1080px;margin:0 auto}
h1{font-size:32px;margin:0 0 8px}
h2{font-size:20px;margin:28px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}
.meta{color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{background:#eaf2fb;color:#0b3b70}
.level{font-weight:bold;color:var(--accent)}
footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--line);color:var(--muted);font-size:12px}
@media print{body{background:#fff;padding:0}main{max-width:none}}
</style>
</head>
<body>
<main>
<h1>{{TITLE}}</h1>
