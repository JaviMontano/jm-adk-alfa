<!-- JM Labs Quality Metrics Template -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | Quality Metrics | JM Labs</title>
<style>
:root{--navy:#122562;--gold:#ffd700;--blue:#137dc5;--ink:#111827;--muted:#4b5563;--line:#d1d5db;--bg:#f8fafc}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);margin:0;padding:32px}
.wrap{max-width:1080px;margin:0 auto}
header{border-bottom:4px solid var(--gold);padding-bottom:16px;margin-bottom:24px}
h1{color:var(--navy);font-size:32px;margin:0 0 8px}
h2{color:var(--blue);font-size:22px;margin-top:28px}
.meta{color:var(--muted)}
.panel{background:#fff;border:1px solid var(--line);border-radius:6px;padding:18px;margin:16px 0}
table{border-collapse:collapse;width:100%;background:#fff}
th,td{border:1px solid var(--line);padding:10px;text-align:left}
th{background:#eef2ff;color:var(--navy)}
footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--line);color:var(--muted);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>{{TITLE}}</h1>
    <p class="meta">JM Labs | Quality Metrics | {{VERSION}}</p>
  </header>
  <main>{{CONTENT}}</main>
  <footer>Generated from the deterministic Quality Metrics contract.</footer>
</div>
</body>
</html>
