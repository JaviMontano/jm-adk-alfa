<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} | Output Contract Enforcer | JM Labs</title>
<style>
:root{--navy:#122562;--gold:#FFD700;--bg:#0B1120;--panel:#0F1929;--text:#F1F5F9;--muted:#94A3B8}
*{box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:32px;line-height:1.55}
main{max-width:1000px;margin:0 auto}
h1{font-size:32px;margin:0 0 8px}
h2{color:var(--gold);border-bottom:1px solid rgba(255,255,255,.12);padding-bottom:8px;margin-top:28px}
.packet{background:var(--panel);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:24px;margin-top:20px}
.meta{color:var(--muted)}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.12);text-align:left}
th{color:var(--gold)}
footer{margin-top:32px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<main>
  <h1>{{TITLE}}</h1>
  <p class="meta">{{SUBTITLE}}</p>
  <section class="packet">{{CONTENT}}</section>
  <footer>JM Labs · Output Contract Enforcer · {{CREATED_DATE}}</footer>
</main>
</body>
</html>
