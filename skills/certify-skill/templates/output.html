<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | Certify Skill</title>
<style>
:root{--ink:#1f2937;--muted:#6b7280;--line:#d1d5db;--bg:#ffffff;--block:#991b1b;--pass:#166534}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);margin:0;padding:24px;line-height:1.45}
main{max-width:1080px;margin:0 auto}
h1{font-size:28px;margin:0 0 4px}
h2{font-size:18px;margin:28px 0 8px;border-bottom:1px solid var(--line);padding-bottom:6px}
.meta{color:var(--muted);margin:0 0 20px}
.cert-pass{color:var(--pass);font-weight:700}
.cert-block{color:var(--block);font-weight:700}
table{width:100%;border-collapse:collapse;margin:12px 0}
th,td{border:1px solid var(--line);padding:8px;vertical-align:top}
th{background:#f3f4f6;text-align:left}
code{background:#f3f4f6;padding:1px 4px;border-radius:3px}
footer{margin-top:28px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<main>
  <h1>{{TITLE}}</h1>
  <p class="meta">JM Labs Certify Skill · {{CERTIFICATION}}</p>
  <section>{{SUMMARY_TABLE}}</section>
  <section>{{RUBRIC_TABLE}}</section>
  <section>{{STRUCTURAL_TABLE}}</section>
  <section>{{CONTENT_TABLE}}</section>
  <section>{{SYSTEMIC_TABLE}}</section>
  <section>{{MOAT_TABLE}}</section>
  <section>{{BLOCKERS_TABLE}}</section>
  <section>{{RECOMMENDATION}}</section>
  <footer>{{CAVEATS}}</footer>
</main>
</body>
</html>
