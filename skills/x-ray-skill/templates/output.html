<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} | X-Ray Skill</title>
  <style>
    :root { --ink: #18212f; --muted: #5b6777; --line: #d9e0e8; --accent: #7c3aed; --surface: #f7f8fb; }
    body { margin: 0; padding: 32px; font-family: Arial, sans-serif; color: var(--ink); background: white; }
    main { max-width: 1040px; margin: 0 auto; }
    h1, h2 { line-height: 1.2; }
    .meta { color: var(--muted); margin-bottom: 24px; }
    section { border-top: 1px solid var(--line); padding: 18px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; border-bottom: 1px solid var(--line); padding: 8px; vertical-align: top; }
    th { background: var(--surface); }
    code { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>{{TITLE}}</h1>
    <p class="meta">{{SUBTITLE}}</p>
    {{CONTENT}}
  </main>
</body>
</html>
