<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | Input Analyst</title>
<style>
:root{--bg:#0b1120;--panel:#101827;--line:#263244;--text:#e5e7eb;--muted:#94a3b8;--accent:#f5c542;--code:#8bd3ff}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;line-height:1.55}
main{max-width:1040px;margin:0 auto;padding:32px 20px}
header{border-bottom:1px solid var(--line);margin-bottom:24px;padding-bottom:18px}
h1{font-size:32px;margin:0 0 8px}
h2{font-size:18px;color:var(--accent);margin:24px 0 10px}
.meta{color:var(--muted);font-size:14px}
.section{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;margin:14px 0}
code{color:var(--code)}
footer{border-top:1px solid var(--line);color:var(--muted);font-size:13px;margin-top:28px;padding-top:14px}
</style>
</head>
<body>
<main>
  <header>
    <h1>{{TITLE}}</h1>
    <div class="meta">{{SUBTITLE}}</div>
  </header>
  <section class="section">{{SUMMARY}}</section>
  <section class="section">{{SURFACE_ERRORS}}</section>
  <section class="section">{{FIVE_WHYS}}</section>
  <section class="section">{{SEVEN_SO_WHATS}}</section>
  <section class="section">{{INTENT_GAP_ANALYSIS}}</section>
  <section class="section">{{AMBIGUITY_REGISTER}}</section>
  <section class="section">{{ACTIONABILITY_SCORE}}</section>
  <section class="section">{{CLARIFIED_PROMPT}}</section>
  <section class="section">{{ROUTING_HINTS}}</section>
  <section class="section">{{SAFETY_PRIVACY_FLAGS}}</section>
  <section class="section">{{CONFIDENCE}}</section>
  <footer>Input Analyst · Offline deterministic template · {{DATE}}</footer>
</main>
</body>
</html>
