<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} | Funnel Design</title>
<style>
:root{--ink:#172033;--surface:#f5f7fb;--line:#d8dee9;--accent:#2563eb;--stage:#0f766e}
body{font-family:Inter,Arial,sans-serif;background:#fff;color:var(--ink);margin:0;padding:32px;line-height:1.5}
main{max-width:1080px;margin:0 auto}
h1{font-size:32px;margin:0 0 8px}
h2{font-size:20px;margin-top:28px;border-bottom:1px solid var(--line);padding-bottom:8px}
.meta{color:#475569;margin-bottom:24px}
.stage{background:var(--surface);border-left:4px solid var(--stage);padding:14px;margin:12px 0}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left}
th{background:var(--surface);font-size:13px;text-transform:uppercase;letter-spacing:.04em}
footer{margin-top:36px;color:#64748b;font-size:12px}
</style>
</head>
<body><main>
<h1>{{TITLE}}</h1>
<p class="meta">{{SUBTITLE}}</p>
{{CONTENT}}
<footer>Generated by funnel-design on {{DATE}}</footer>
</main></body>
</html>
