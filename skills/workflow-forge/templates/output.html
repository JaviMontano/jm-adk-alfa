<!-- JM Labs: Workflow Forge -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{TITLE}} | Workflow Forge | JM Labs</title>
  <style>
    :root { --navy: #122562; --gold: #FFD700; --ink: #1F2833; --paper: #F8FAFC; }
    body { margin: 0; font-family: Arial, sans-serif; color: var(--ink); background: var(--paper); }
    main { max-width: 980px; margin: 0 auto; padding: 32px; }
    h1, h2 { color: var(--navy); }
    .accent { color: var(--gold); }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #CBD5E1; padding: 8px; text-align: left; }
    footer { margin-top: 32px; border-top: 2px solid var(--gold); padding-top: 12px; font-size: 12px; }
  </style>
</head>
<body>
  <main>
    <h1>Workflow <span class="accent">Forge</span></h1>
    <h2>{{TITLE}}</h2>
    <section>{{CONTENT}}</section>
    <footer>JM Labs / Workflow Forge / {{DATE}}</footer>
  </main>
</body>
</html>
