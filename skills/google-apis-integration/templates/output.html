<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} | Google APIs Integration | JM Labs</title>
<style>
:root{--navy:#122562;--gold:#ffd700;--blue:#137dc5;--bg:#f8fafc;--ink:#0f172a;--muted:#475569;--line:#dbe3ef}
body{font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--ink);margin:0;padding:32px;line-height:1.55}
main{max-width:1040px;margin:0 auto}
header{border-bottom:4px solid var(--gold);padding-bottom:16px;margin-bottom:24px}
h1{font-size:34px;margin:0;color:var(--navy)}
h2{font-size:20px;margin-top:28px;color:var(--navy)}
.meta{color:var(--muted);font-size:14px}
.panel{border:1px solid var(--line);background:#fff;border-radius:8px;padding:18px;margin:16px 0}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}
th{color:var(--navy)}
code,pre{font-family:"SFMono-Regular",Consolas,monospace}
pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:16px;border-radius:8px;overflow:auto}
footer{margin-top:40px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<main>
  <header>
    <h1>{{TITLE}}</h1>
    <p class="meta">{{SUBTITLE}} | {{DATE}}</p>
  </header>
  <section class="panel">{{CONTENT}}</section>
  <footer>JM Labs | Google APIs Integration | Offline deterministic template</footer>
</main>
</body>
</html>
