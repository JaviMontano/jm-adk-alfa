<!DOCTYPE html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="icon" type="image/svg+xml" href="{{FAVICON_HREF}}">
<style>
:root{
  --brand-primary: {{BRAND_PRIMARY}};
  --brand-black: {{BRAND_BLACK}};
  --brand-white: {{BRAND_WHITE}};
  --brand-bg: {{BRAND_BG}};
  --brand-muted: {{BRAND_MUTED}};
  --font-display: {{FONT_DISPLAY}};
  --font-body: {{FONT_BODY}};
}
*{box-sizing:border-box}
body{margin:0;background:var(--brand-bg);color:var(--brand-black);font-family:var(--font-body);line-height:1.5}
header{background:var(--brand-black);color:var(--brand-white)}
nav,main,footer{max-width:1120px;margin:0 auto;padding:24px}
h1,h2,h3{font-family:var(--font-display);line-height:1.1}
.hero{display:grid;gap:24px;padding:48px 24px}
.cta{display:inline-block;background:var(--brand-primary);color:var(--brand-white);padding:12px 18px;border-radius:12px;text-decoration:none}
@media (max-width:720px){nav,main,footer{padding:18px}.hero{padding:32px 18px}}
</style>
</head>
<body>
<header><nav aria-label="Primary">{{WORDMARK}}</nav></header>
<main>
  <section class="hero">
    <h1>{{HEADLINE}}</h1>
    <p>{{SUBTITLE}}</p>
    <a class="cta" href="{{CTA_HREF}}">{{CTA_LABEL}}</a>
  </section>
</main>
<footer>{{FOOTER_TEXT}}</footer>
</body>
</html>
